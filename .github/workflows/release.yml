name: release-relay-server

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux amd64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/anki-relay-server \
            .

      - name: Prepare release archive
        run: |
          cp deploy/anki-relay.service dist/anki-relay.service
          tar -C dist -czf dist/anki-relay-linux-amd64.tar.gz \
            anki-relay-server \
            anki-relay.service

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/anki-relay-linux-amd64.tar.gz